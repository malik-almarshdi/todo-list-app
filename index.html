<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>To-Do List</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>To-Do List</h1>

<p id="taskCounter">Tasks left: 0</p>

<div class="progress-box">

<p id="progressText">0 / 0 completed</p>

<div class="progress-bar">
<div id="progressFill"></div>
</div>

</div>

<div class="task-form">

<input id="taskInput" placeholder="Write your task...">

<input type="date" id="taskDate">

<select id="taskPriority">
<option value="normal">Normal</option>
<option value="important">Important</option>
</select>

<button onclick="addTask()">Add Task</button>

</div>

<div class="boards">

<div class="box">
<h2>Today</h2>
<ul id="todayTasks"></ul>
</div>

<div class="box">
<h2>Upcoming</h2>
<ul id="futureTasks"></ul>
</div>

<div class="box">
<h2>Completed</h2>
<ul id="doneTasks"></ul>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
